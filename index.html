<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fdf1f7;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      width: 350px;
      height: 350px;
    }

    h2 {
      font-size: 18px;
      color: #6b4b5a;
      margin-bottom: 15px;
    }

    /* PIXEL HEART */
    .heart {
      width: 16px;
      height: 16px;
      background: #ff7eb6;
      position: relative;
      margin: 0 auto 20px auto;
      transform: scale(6);
      image-rendering: pixelated;
    }

    .heart::before,
    .heart::after {
      content: "";
      width: 16px;
      height: 16px;
      background: #ff7eb6;
      position: absolute;
    }

    .heart::before {
      left: -16px;
    }

    .heart::after {
      top: -16px;
    }

    .pixel-button {
      padding: 12px 20px;
      font-size: 16px;
      border: 4px solid #3d7d4f;
      background: #7dff9f;
      color: #2d5a3a;
      cursor: pointer;
      box-shadow: 4px 4px 0px #3d7d4f;
      transition: transform 0.1s ease;
    }

    .pixel-button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #3d7d4f;
    }

    /* SCREEN SECTIONS */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ENVELOPE */
    .envelope-wrapper {
      position: relative;
      width: 220px;
      height: 140px;
      cursor: pointer;
      transform: translateX(400px);
      transition: transform 0.8s ease;
    }

    .envelope {
      position: absolute;
      width: 220px;
      height: 140px;
      background: #ffe4f2;
      border: 5px solid #cc7fa6;
      box-sizing: border-box;
      image-rendering: pixelated;
    }

    /* flap */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-top: 80px solid #ffb6d8;
      transform-origin: top;
      transition: transform 0.6s ease;
    }

    /* bottom triangle */
    .bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 80px solid #ffc9e4;
    }

    /* letter */
    .letter {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      width: 190px;
      height: 100px;
      background: #ffffff;
      border: 4px solid #cc7fa6;
      box-sizing: border-box;
      padding: 10px;
      font-size: 14px;
      color: #6b4b5a;
      text-align: center;
      transition: transform 0.8s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* open state */
    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      transform: translateX(-50%) translateY(-60px);
    }

    /* slide in animation trigger */
    .show-envelope {
      transform: translateX(0);
    }

    /* Cute top text */
    .instruction {
      font-size: 16px;
      color: #6b4b5a;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- SCREEN 1 -->
    <div class="screen" id="screen1">
      <div class="heart"></div>
      <button class="pixel-button" id="startBtn">click here!</button>
    </div>

    <!-- SCREEN 2 -->
    <div class="screen hidden" id="screen2">
      <div class="instruction">click to open</div>

      <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="envelope"></div>
        <div class="flap"></div>
        <div class="bottom"></div>

        <div class="letter">
          Happy birthday Mom!<br />
          I love you so much.
        </div>
      </div>
    </div>

  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const envelopeWrapper = document.getElementById("envelopeWrapper");

    startBtn.addEventListener("click", () => {
      screen1.classList.add("hidden");
      screen2.classList.remove("hidden");

      setTimeout(() => {
        envelopeWrapper.classList.add("show-envelope");
      }, 100);
    });

    envelopeWrapper.addEventListener("click", () => {
      envelopeWrapper.classList.toggle("open");
    });
  </script>
</body>
</html>
