<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fdf1f7;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      width: 360px;
      height: 360px;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ---------- PIXEL HEART ---------- */
    .pixel-heart {
      display: grid;
      grid-template-columns: repeat(7, 12px);
      grid-template-rows: repeat(6, 12px);
      gap: 2px;
      margin-bottom: 35px;
      transform: scale(1.6);
      image-rendering: pixelated;
    }

    .pixel-heart div {
      width: 12px;
      height: 12px;
      background: transparent;
    }

    .pixel-heart .filled {
      background: #ff7eb6;
    }

    /* ---------- BUTTON ---------- */
    .pixel-button {
      padding: 12px 22px;
      font-size: 16px;
      border: 4px solid #3d7d4f;
      background: #7dff9f;
      color: #2d5a3a;
      cursor: pointer;
      box-shadow: 4px 4px 0px #3d7d4f;
      transition: transform 0.1s ease;
    }

    .pixel-button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #3d7d4f;
    }

    /* ---------- SCREEN 2 TEXT ---------- */
    .instruction {
      font-size: 16px;
      color: #6b4b5a;
      margin-bottom: 15px;
    }

    /* ---------- ENVELOPE WRAPPER ---------- */
    .envelope-wrapper {
      position: relative;
      width: 220px;
      height: 220px; /* extra space for letter sliding out */
      cursor: pointer;
      transform: translateX(400px);
      transition: transform 0.8s ease;
    }

    .show-envelope {
      transform: translateX(0);
    }

    /* ---------- ENVELOPE BODY ---------- */
    .envelope {
      position: absolute;
      bottom: 0;
      width: 220px;
      height: 140px;
      background: #ffe4f2;
      border: 5px solid #cc7fa6;
      box-sizing: border-box;
      overflow: hidden; /* IMPORTANT: hides the letter */
      z-index: 2;
    }

    /* ---------- LETTER (STARTS HIDDEN INSIDE) ---------- */
    .letter {
      position: absolute;
      width: 190px;
      height: 110px;
      left: 50%;
      transform: translateX(-50%);
      bottom: -90px; /* hidden inside envelope */
      background: #ffffff;
      border: 4px solid #cc7fa6;
      box-sizing: border-box;
      padding: 12px;
      font-size: 14px;
      color: #6b4b5a;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: bottom 0.9s ease;
      z-index: 1;
    }

    /* ---------- TOP FLAP ---------- */
    .flap {
      position: absolute;
      top: 80px;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-top: 80px solid #ffb6d8;
      transform-origin: top;
      transition: transform 0.6s ease;
      z-index: 4;
    }

    /* ---------- BOTTOM TRIANGLE ---------- */
    .bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 80px solid #ffc9e4;
      z-index: 3;
    }

    /* ---------- OPEN STATE ---------- */
    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      bottom: 55px; /* slides OUT clearly */
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- SCREEN 1 -->
    <div class="screen" id="screen1">

      <div class="pixel-heart">
        <div></div><div class="filled"></div><div class="filled"></div><div></div><div class="filled"></div><div class="filled"></div><div></div>
        <div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div>
        <div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div>
        <div></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div></div>
        <div></div><div></div><div class="filled"></div><div class="filled"></div><div class="filled"></div><div></div><div></div>
        <div></div><div></div><div></div><div class="filled"></div><div></div><div></div><div></div>
      </div>

      <button class="pixel-button" id="startBtn">click here!</button>
    </div>

    <!-- SCREEN 2 -->
    <div class="screen hidden" id="screen2">
      <div class="instruction">click to open</div>

      <div class="envelope-wrapper" id="envelopeWrapper">

        <!-- envelope body contains the letter -->
        <div class="envelope">
          <div class="letter">
            Happy birthday Mom!<br />
            I love you so much.
          </div>
        </div>

        <div class="flap"></div>
        <div class="bottom"></div>
      </div>
    </div>

  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const envelopeWrapper = document.getElementById("envelopeWrapper");

    startBtn.addEventListener("click", () => {
      screen1.classList.add("hidden");
      screen2.classList.remove("hidden");

      setTimeout(() => {
        envelopeWrapper.classList.add("show-envelope");
      }, 150);
    });

    envelopeWrapper.addEventListener("click", () => {
      envelopeWrapper.classList.toggle("open");
    });
  </script>
</body>
</html>
